<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romnes Kiosken</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .item { background: white; padding: 15px; margin: 10px auto; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 300px; }
        button { padding: 10px 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; }
        .count { font-size: 20px; font-weight: bold; margin: 0 15px; }
    </style>
</head>
<body>
    <h1>Romnes Kiosken</h1>
    <div id="app"></div>

    <script>
        const items = [
            { name: "Red Bull", count: 10 },
            { name: "Twix", count: 5 },
            { name: "Burn", count: 8 }
        ];

        function render() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <h3>${item.name}</h3>
                    <button onclick="change(${index}, -1)">-</button>
                    <span class="count">${item.count}</span>
                    <button onclick="change(${index}, 1)">+</button>
                `;
                container.appendChild(div);
            });
        }

        function change(index, amount) {
            items[index].count = Math.max(0, items[index].count + amount);
            render();
        }

        render();
    </script>
</body>
</html>
