<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Romnes Kiosk Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 160px; }
        h1 { text-align: center; padding: 20px 0; margin: 0; font-size: 24px; }
        
        .summary-bar { background: #1a1a1a; color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .summary-bar div span { display: block; font-size: 18px; font-weight: bold; color: #007bff; }

        .item { 
            background: white; padding: 15px; margin: 12px 0; border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        .info h3 { margin: 0; font-size: 18px; color: #000; }
        .info p { margin: 4px 0 0; color: #666; font-size: 13px; }
        
        .controls { display: flex; align-items: center; gap: 12px; }
        button.btn-ctrl { 
            width: 48px; height: 48px; border: none; border-radius: 12px; 
            background: #007bff; color: white; font-size: 26px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        .count { font-size: 24px; font-weight: bold; min-width: 45px; text-align: center; }
        
        .admin-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 15px; border-top: 2px solid #ddd; }
        .admin-controls { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-ui { border: none; border-radius: 10px; color: white; font-weight: bold; height: 45px; cursor: pointer; width: 100%; }
        
        .inventory-mode .item { border-left: 10px solid #ffc107; background: #fffdf5; }
    </style>
</head>
<body>

<div class="container">
    <h1>Romnes Kiosken</h1>
    
    <div class="summary-bar">
        <div>Lagerverdi<span id="totalValue">0,-</span></div>
        <div>Salg i kr<span id="totalSales">0,-</span></div>
    </div>

    <div id="app"></div>
</div>

<div class="admin-panel">
    <div id="adminArea" class="admin-controls">
        <button class="btn-ui" style="background: #28a745;" onclick="toggleInventoryMode()">Varetelling PÅ/AV</button>
        <button class="btn-ui" style="background: #17a2b8;" onclick="exportData()">Kopier Rapport</button>
    </div>
    <button class="btn-ui" style="background: #6c757d;" onclick="toggleAdmin()" id="toggleBtn">Admin / Varetelling</button>
</div>

<script>
    // Tilbake til de originale varene dine
    const defaultItems = [
        { name: "Red Bull", price: 35, startCount: 10, currentCount: 10, physical: 10 },
        { name: "Twix", price: 20, startCount: 5, currentCount: 5, physical: 5 },
        { name: "Burn", price: 30, startCount: 8, currentCount: 8, physical: 8 }
    ];

    let items = JSON.parse(localStorage.getItem('kioskRomnesV4')) || defaultItems;
    let isInventoryMode = false;
    let isAdminOpen = false;

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        let totalValue = 0;
        let totalSales = 0;
        
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `item ${isInventoryMode ? 'inventory-mode' : ''}`;
            
            let displayCount = isInventoryMode ? item.physical : item.currentCount;
            let subText = isInventoryMode ? `Fysisk i hylle` : `Pris: ${item.price},-`;

            // Beregninger
            totalValue += item.currentCount * item.price;
            totalSales += (item.startCount - item.currentCount) * item.price;

            div.innerHTML = `
                <div class="info">
                    <h3>${item.name}</h3>
                    <p>${subText}</p>
                </div>
                <div class="controls">
                    <button class="btn-ctrl" onclick="change(${index}, -1)">−</button>
                    <span class="count">${displayCount}</span>
                    <button class="btn-ctrl" onclick="change(${index}, 1)">+</button>
                </div>
            `;
            app.appendChild(div);
        });

        document.getElementById('totalValue').innerText = totalValue + ",-";
        document.getElementById('totalSales').innerText = totalSales + ",-";
        localStorage.setItem('kioskRomnesV4', JSON.stringify(items));
    }

    function change(index, amount) {
        if (isInventoryMode) {
            items[index].physical = Math.max(0, items[index].physical + amount);
        } else {
            items[index].currentCount = Math.max(0, items[index].currentCount + amount);
        }
        render();
    }

    function toggleAdmin() {
        isAdminOpen = !isAdminOpen;
        document.getElementById('adminArea').style.display = isAdminOpen ? 'grid' : 'none';
        document.getElementById('toggleBtn').innerText = isAdminOpen ? 'Skjul Admin' : 'Admin / Varetelling';
    }

    function toggleInventoryMode() {
        isInventoryMode = !isInventoryMode;
        render();
    }

    function exportData() {
        let txt = "KIOSK RAPPORT\n";
        items.forEach(i => {
            txt += `${i.name}: På lager(${i.currentCount}) Fysisk(${i.physical}) Diff(${i.physical - i.currentCount})\n`;
        });
        navigator.clipboard.writeText(txt).then(() => alert("Rapport kopiert!"));
    }

    render();
</script>
</body>
</html>
