<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Romnes Kiosken</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .low-stock { border: 2px solid #ef4444 !important; background-color: #fef2f2; }
    </style>
</head>
<body class="bg-slate-50 pb-40 transition-all duration-300">
    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-red-600 tracking-tight uppercase">Romnes <span class="italic">Kiosken</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Lagersystem v1.4</p>
            </div>
            <button onclick="toggleAdmin()" id="admin-btn" class="bg-slate-200 text-slate-600 px-3 py-1 rounded font-bold text-[10px] uppercase shadow-sm">Admin: AV</button>
        </header>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="bg-white p-3 rounded-2xl shadow-sm border-b-4 border-green-500 text-center">
                <p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Fortjeneste</p>
                <p id="stat-profit" class="text-sm font-black text-slate-800">0,-</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border-b-4 border-orange-500 text-center">
                <p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Omsetning</p>
                <p id="stat-revenue" class="text-sm font-black text-slate-800">0,-</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Lagerverdi</p>
                <p id="stat-stock" class="text-sm font-black text-slate-800">0,-</p>
            </div>
        </div>

        <div id="admin-panel" class="hidden mb-6 p-5 bg-slate-800 rounded-3xl text-white shadow-2xl">
            <h2 id="admin-title" class="text-xs font-bold mb-3 uppercase tracking-wider">Administrer vare</h2>
            <input id="edit-id" type="hidden">
            <div class="grid grid-cols-2 gap-2 text-black">
                <input id="new-n" type="text" placeholder="Navn" class="p-3 rounded-xl text-xs">
                <input id="new-inn" type="number" placeholder="Lagerantall" class="p-3 rounded-xl text-xs">
                <input id="new-p" type="number" placeholder="Utsalgspris" class="p-3 rounded-xl text-xs">
                <input id="new-c" type="number" step="0.01" placeholder="Innkjøp (eks pant)" class="p-3 rounded-xl text-xs">
            </div>
            <div class="flex gap-2 mt-4">
                <button id="add-btn" onclick="addVare()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Legg til</button>
                <button id="save-btn" onclick="saveEdit()" class="hidden flex-1 bg-green-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Lagre endring</button>
                <button id="cancel-btn" onclick="cancelEdit()" class="hidden bg-slate-600 text-white px-4 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">X</button>
            </div>
        </div>

        <div id="app" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t p-4 z-50">
        <div class="max-w-md mx-auto grid grid-cols-2 gap-3">
            <button onclick="exportCSV()" class="bg-slate-800 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest">Excel Eksport</button>
            <button onclick="toggleRestock()" id="restock-btn" class="bg-blue-600 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg">Telle Modus</button>
        </div>
    </div>
