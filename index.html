<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Romnes Kiosken</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .low-stock { border: 2px solid #ef4444 !important; background-color: #fef2f2; }
    </style>
</head>
<body class="bg-slate-50 pb-40 transition-all duration-300">
    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight uppercase">Romnes <span class="text-blue-600 italic">Kiosken</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Lagersystem v1.0</p>
            </div>
            <button onclick="toggleAdmin()" id="admin-btn" class="bg-slate-200 text-slate-600 px-3 py-1 rounded font-bold text-[10px] uppercase shadow-sm">Admin: AV</button>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-500">
                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Total Fortjeneste</p>
                <p id="stat-profit" class="text-xl font-black text-slate-800">0,-</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-500">
                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Verdi på lager</p>
                <p id="stat-stock" class="text-xl font-black text-slate-800">0,-</p>
            </div>
        </div>

        <div id="admin-panel" class="hidden mb-6 p-5 bg-slate-800 rounded-3xl text-white shadow-2xl">
            <h2 class="text-xs font-bold mb-3 uppercase tracking-wider">Ny vare / Redigering</h2>
            <div class="grid grid-cols-2 gap-2 text-black">
                <input id="new-n" type="text" placeholder="Navn på vare" class="p-3 rounded-xl text-xs">
                <input id="new-inn" type="number" placeholder="Antall på lager" class="p-3 rounded-xl text-xs">
                <input id="new-p" type="number" placeholder="Utsalgspris" class="p-3 rounded-xl text-xs">
                <input id="new-c" type="number" step="0.01" placeholder="Innkjøpspris" class="p-3 rounded-xl text-xs">
            </div>
            <button onclick="addVare()" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">Legg til i listen</button>
        </div>

        <div id="app" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t p-4 z-50">
        <div class="max-w-md mx-auto grid grid-cols-2 gap-3">
            <button onclick="exportCSV()" class="bg-slate-800 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest">Excel Eksport</button>
            <button onclick="toggleRestock()" id="restock-btn" class="bg-blue-600 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg">Telle Modus</button>
        </div>
    </div>

    <script>
        const VARE_LISTE = [
            { id: 1, n: "Red Bull Regular", p: 42, c: 33.67, in: 48 },
            { id: 2, n: "Twix Xtra 75g", p: 30, c: 25.06, in: 30 },
            { id: 3, n: "Burn Original 0,5L", p: 30, c: 23.83, in: 24 },
            { id: 4, n: "Monster Ultra White", p: 30, c: 22.30, in: 24 },
            { id: 17, n: "Monster Energy Orig.", p: 30, c: 22.30, in: 0 },
            { id: 5, n: "Farris Frus Eple/Kiwi", p: 30, c: 22.53, in: 24 },
            { id: 6, n: "Urge 0,5L", p: 30, c: 21.04, in: 24 },
            { id: 7, n: "Villa 0,5L", p: 30, c: 20.85, in: 24 },
            { id: 8, n: "Farris Lime 0,5L", p: 30, c: 20.49, in: 24 },
            { id: 9, n: "Farris Naturell 0,5L", p: 30, c: 19.51, in: 24 },
            { id: 10, n: "Pepsi Max 0,5L", p: 30, c: 19.19, in: 24 },
            { id: 11, n: "Coca-Cola 0,5L", p: 30, c: 18.10, in: 72 },
            { id: 12, n: "Snickers Single 50g", p: 25, c: 17.80, in: 32 },
            { id: 13, n: "Center Rull", p: 25, c: 16.25, in: 36 },
            { id: 14, n: "Fishermans Friend MI", p: 25, c: 14.64, in: 24 },
            { id: 15, n: "Pringles 40g (Alle)", p: 25, c: 13.92, in: 24 },
            { id: 16, n: "Fishermans Friend SA", p: 25, c: 13.39, in: 24 }
        ];

        let state = JSON.parse(localStorage.getItem('kioskPro_v5')) || {
            varer: VARE_LISTE.map(v => ({...v, cur: v.in})),
            admin: false,
            restock: false
        };

        function toggleAdmin() { state.admin = !state.admin; render(); }
        function toggleRestock() { state.restock = !state.restock; render(); }

        function addVare() {
            const n = document.getElementById('new-n').value;
            const inn = parseInt(document.getElementById('new-inn').value) || 0;
            const p = parseFloat(document.getElementById('new-p').value);
            const c = parseFloat(document.getElementById('new-c').value);
            if(!n || !p || !c) return alert("Fyll ut alt");
            state.varer.push({ id: Date.now(), n, p, c, in: inn, cur: inn });
            save(); render();
            ['new-n','new-inn','new-p','new-c'].forEach(id => document.getElementById(id).value = '');
        }

        function update(id, delta) {
            const v = state.varer.find(x => x.id === id);
            if(state.restock) {
                v.in = Math.max(0, v.in + delta);
                v.cur = Math.max(0, v.cur + delta);
            } else {
                v.cur = Math.min(v.in, Math.max(0, v.cur + delta));
            }
            save(); refreshStats();
        }

        function deleteVare(id) {
            if(confirm("Slette vare permanent?")) {
                state.varer = state.varer.filter(v => v.id !== id);
                save(); render();
            }
        }

        function save() { localStorage.setItem('kioskPro_v5', JSON.stringify(state)); }

        function refreshStats() {
            let totalProfit = 0, stockValue = 0;
            state.varer.forEach(v => {
                const solgt = v.in - v.cur;
                totalProfit += solgt * (v.p - v.c);
                stockValue += v.cur * v.c;
                document.getElementById(`qty-${v.id}`).innerText = v.cur;
                const card = document.getElementById(`card-${v.id}`);
                if(v.cur <= 3) card.classList.add('low-stock');
                else card.classList.remove('low-stock');
            });
            document.getElementById('stat-profit').innerText = Math.round(totalProfit) + ",-";
            document.getElementById('stat-stock').innerText = Math.round(stockValue) + ",-";
        }

        function render() {
            document.getElementById('admin-btn').innerText = state.admin ? "Admin: PÅ" : "Admin: AV";
            document.getElementById('admin-panel').style.display = state.admin ? 'block' : 'none';
            document.getElementById('restock-btn').innerText = state.restock ? "Innkjøp" : "Telling";
            document.getElementById('restock-btn').className = state.restock ? "bg-rose-600 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg animate-pulse" : "bg-blue-600 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg";

            const container = document.getElementById('app');
            container.innerHTML = '';

            state.varer.forEach(v => {
                const margin = ((v.p - v.c) / v.p) * 100;
                const marginColor = margin < 15 ? 'text-red-500' : (margin < 25 ? 'text-amber-500' : 'text-green-600');
                const div = document.createElement('div');
                div.id = `card-${v.id}`;
                div.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-slate-800 text-[13px] leading-tight">${v.n}</h3>
                            <p class="text-[9px] font-bold uppercase ${marginColor} mt-1">Margin: ${margin.toFixed(0)}% (${(v.p-v.c).toFixed(1)} kr)</p>
                        </div>
                        ${state.admin ? `<button onclick="deleteVare(${v.id})" class="text-[9px] text-red-300 font-bold uppercase">Slett</button>` : ''}
                    </div>
                    <div class="flex items-center justify-between mt-3">
                        <div class="text-[9px] text-slate-400 font-mono">Lager: ${v.cur} av ${v.in}</div>
                        <div class="flex items-center gap-3">
                            <button onclick="update(${v.id}, -1)" class="w-12 h-10 bg-slate-50 border border-slate-100 rounded-xl font-black text-slate-700 active:bg-slate-200 shadow-sm">-</button>
                            <span id="qty-${v.id}" class="w-6 text-center font-black text-blue-600 text-lg">${v.cur}</span>
                            <button onclick="update(${v.id}, 1)" class="w-12 h-10 bg-slate-50 border border-slate-100 rounded-xl font-black text-slate-700 active:bg-slate-200 shadow-sm">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            refreshStats();
        }

        function exportCSV() {
            let csv = "Vare;Total_Inn;Lager;Solgt;Profit\n";
            state.varer.forEach(v => csv += `${v.n};${v.in};${v.cur};${v.in-v.cur};${((v.in-v.cur)*(v.p-v.c)).toFixed(2)}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Romnes_Kiosken_Status.csv";
            link.click();
        }

        render();
    </script>
</body>
</html>
