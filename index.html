<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romnes Kiosken</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        h1 { color: #1a1a1a; text-align: center; margin-bottom: 30px; }
        .item { 
            background: white; 
            padding: 20px; 
            margin: 15px auto; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info { text-align: left; }
        .info h3 { margin: 0; font-size: 18px; color: #000; }
        .info p { margin: 5px 0 0; color: #666; font-size: 14px; font-weight: 500; }
        .controls { display: flex; align-items: center; }
        button { 
            padding: 0; 
            width: 45px;
            height: 45px;
            font-size: 24px; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            background: #007bff; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        button:active { background: #0056b3; }
        .count { font-size: 24px; font-weight: bold; margin: 0 20px; min-width: 40px; text-align: center; }
    </style>
</head>
<body>
    <h1>Romnes Kiosken</h1>
    <div id="app"></div>

    <script>
        // Her kan du enkelt legge til flere varer eller endre priser senere
        const items = [
            { name: "Red Bull", price: "35,-", count: 10 },
            { name: "Twix", price: "20,-", count: 5 },
            { name: "Burn", price: "30,-", count: 8 },
            { name: "Sørlandschips", price: "25,-", count: 4 }
        ];

        function render() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="info">
                        <h3>${item.name}</h3>
                        <p>Pris: ${item.price}</p>
                    </div>
                    <div class="controls">
                        <button onclick="change(${index}, -1)">−</button>
                        <span class="count">${item.count}</span>
                        <button onclick="change(${index}, 1)">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function change(index, amount) {
            items[index].count = Math.max(0, items[index].count + amount);
            render();
        }

        render();
    </script>
</body>
</html>
