<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Romnes Kiosken</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .low-stock { border: 2px solid #ef4444 !important; background-color: #fef2f2; }
    </style>
</head>
<body class="bg-slate-50 pb-40 transition-all duration-300">
    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-red-600 tracking-tight uppercase">Romnes <span class="italic text-red-600">Kiosken</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Lagersystem v1.5 (Inkl. Pant)</p>
            </div>
            <button onclick="toggleAdmin()" id="admin-btn" class="bg-slate-200 text-slate-600 px-3 py-1 rounded font-bold text-[10px] uppercase shadow-sm">Admin: AV</button>
        </header>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="bg-white p-3 rounded-2xl shadow-sm border-b-4 border-green-500 text-center">
                <p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Fortjeneste</p>
                <p id="stat-profit" class="text-sm font-black text-slate-800">0,-</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border-b-4 border-orange-500 text-center">
                <p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Omsetning</p>
                <p id="stat-revenue" class="text-sm font-black text-slate-800">0,-</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-[7px] font-bold text-slate-400 uppercase mb-1">Lagerverdi</p>
                <p id="stat-stock" class="text-sm font-black text-slate-800">0,-</p>
            </div>
        </div>

        <div id="admin-panel" class="hidden mb-6 p-5 bg-slate-800 rounded-3xl text-white shadow-2xl">
            <h2 id="admin-title" class="text-xs font-bold mb-3 uppercase tracking-wider">Administrer vare</h2>
            <input id="edit-id" type="hidden">
            <div class="grid grid-cols-2 gap-2 text-black">
                <input id="new-n" type="text" placeholder="Navn" class="p-3 rounded-xl text-xs">
                <input id="new-inn" type="number" placeholder="Lagerantall" class="p-3 rounded-xl text-xs">
                <input id="new-p" type="number" placeholder="Pris (inkl pant)" class="p-3 rounded-xl text-xs">
                <input id="new-c" type="number" step="0.01" placeholder="Innkjøp (inkl pant)" class="p-3 rounded-xl text-xs">
            </div>
            <div class="flex gap-2 mt-4">
                <button id="add-btn" onclick="addVare()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Legg til</button>
                <button id="save-btn" onclick="saveEdit()" class="hidden flex-1 bg-green-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Lagre endring</button>
                <button id="cancel-btn" onclick="cancelEdit()" class="hidden bg-slate-600 text-white px-4 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">X</button>
            </div>
        </div>

        <div id="app" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t p-4 z-50">
        <div class="max-w-md mx-auto grid grid-cols-2 gap-3">
            <button onclick="exportCSV()" class="bg-slate-800 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest">Excel Eksport</button>
            <button onclick="toggleRestock()" id="restock-btn" class="bg-blue-600 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg">Telle Modus</button>
        </div>
    </div>

    <script>
        const PANT = 2.40; // Gjennomsnittlig pant inkl mva fra leverandør

        const VARE_LISTE = [
            { id: 1, n: "Red Bull Regular 0,473", p: 47, c: 27.54 + PANT, in: 48 },
            { id: 2, n: "Monster Original 0,5", p: 32, c: 17.65 + PANT, in: 24 },
            { id: 3, n: "Monster Ultra White 0,5", p: 32, c: 17.65 + PANT, in: 24 },
            { id: 4, n: "Burn Original 0,5", p: 32, c: 18.98 + PANT, in: 24 },
            { id: 5, n: "Urge 0,5", p: 32, c: 16.56 + PANT, in: 24 },
            { id: 6, n: "Pepsi Max 0,5", p: 32, c: 14.95 + PANT, in: 24 },
            { id: 7, n: "Coca-Cola 0,5", p: 32, c: 14.00 + PANT, in: 72 },
            { id: 8, n: "Villa 0,5", p: 32, c: 16.39 + PANT, in: 24 },
            { id: 9, n: "Farris Naturell 0,5", p: 32, c: 15.23 + PANT, in: 24 },
            { id: 10, n: "Farris Lime 0,5", p: 32, c: 16.08 + PANT, in: 24 },
            { id: 11, n: "Farris Frus Eple/Kiwi", p: 32, c: 17.85 + PANT, in: 24 },
            { id: 12, n: "Twix Xtra 75g", p: 35, c: 21.79, in: 30 },
            { id: 13, n: "Snickers Single 50g", p: 25, c: 15.48, in: 32 },
            { id: 14, n: "Center Rull 78g", p: 25, c: 14.13, in: 36 },
            { id: 15, n: "Freia Peanøttkubbe", p: 25, c: 13.04, in: 10 },
            { id: 16, n: "Pringles Original 40g", p: 25, c: 12.10, in: 12 },
            { id: 17, n: "Pringles Paprika 40g", p: 25, c: 12.10, in: 12 },
            { id: 18, n: "Fishermans Friend SA", p: 20, c: 11.64, in: 24 },
            { id: 19, n: "Fishermans Friend MI", p: 20, c: 12.73, in: 24 }
        ];

        let state = JSON.parse(localStorage.getItem('kioskPro_v1.5')) || {
            varer: VARE_LISTE.map(v => ({...v, cur: v.in})),
            admin: false,
            restock: false
        };

        function toggleAdmin() { state.admin = !state.admin; cancelEdit(); render(); }
        function toggleRestock() { state.restock = !state.restock; render(); }
        function save() { localStorage.setItem('kioskPro_v1.5', JSON.stringify(state)); }

        function refreshStats() {
            let profit = 0, revenue = 0, stock = 0;
            state.varer.forEach(v => {
                const solgt = v.in - v.cur;
                profit += solgt * (v.p - v.c);
                revenue += solgt * v.p;
                stock += v.cur * v.c;
                const qtyEl = document.getElementById(`qty-${v.id}`);
                if(qtyEl) qtyEl.innerText = v.cur;
            });
            document.getElementById('stat-profit').innerText = Math.round(profit) + ",-";
            document.getElementById('stat-revenue').innerText = Math.round(revenue) + ",-";
            document.getElementById('stat-stock').innerText = Math.round(stock) + ",-";
        }

        function update(id, delta) {
            const v = state.varer.find(x => x.id === id);
            if(state.restock) {
                v.in = Math.max(0, v.in + delta);
                v.cur = Math.max(0, v.cur + delta);
            } else {
                v.cur = Math.min(v.in, Math.max(0, v.cur + delta));
            }
            save(); refreshStats();
        }

        function render() {
            document.getElementById('admin-btn').innerText = state.admin ? "Admin: PÅ" : "Admin: AV";
            document.getElementById('admin-panel').style.display = state.admin ? 'block' : 'none';
            const container = document.getElementById('app');
            container.innerHTML = '';

            state.varer.forEach(v => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-800 text-[13px] leading-tight">${v.n}</h3>
                                ${state.admin ? `<button onclick="editVare(${v.id})" class="text-blue-500 text-[10px]">✎</button>` : ''}
                            </div>
                            <p class="text-[9px] font-bold uppercase text-slate-400 mt-1">Fortjeneste per enhet: ${(v.p - v.c).toFixed(1)} kr</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-between mt-3">
                        <div class="text-[9px] text-slate-400 font-mono">Lager: ${v.cur} | Pris: ${v.p},-</div>
                        <div class="flex items-center gap-3">
                            <button onclick="update(${v.id}, -1)" class="w-12 h-10 bg-slate-50 border border-slate-100 rounded-xl font-black text-slate-700">-</button>
                            <span id="qty-${v.id}" class="w-6 text-center font-black text-blue-600 text-lg">${v.cur}</span>
                            <button onclick="update(${v.id}, 1)" class="w-12 h-10 bg-slate-50 border border-slate-100 rounded-xl font-black text-slate-700">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            refreshStats();
        }

        function editVare(id) {
            const v = state.varer.find(x => x.id === id);
            document.getElementById('edit-id').value = v.id;
            document.getElementById('new-n').value = v.n;
            document.getElementById('new-inn').value = v.in;
            document.getElementById('new-p').value = v.p;
            document.getElementById('new-c').value = v.c;
            document.getElementById('save-btn').classList.remove('hidden');
            document.getElementById('add-btn').classList.add('hidden');
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveEdit() {
            const id = parseInt(document.getElementById('edit-id').value);
            const v = state.varer.find(x => x.id === id);
            v.n = document.getElementById('new-n').value;
            v.in = parseInt(document.getElementById('new-inn').value);
            v.p = parseFloat(document.getElementById('new-p').value);
            v.c = parseFloat(document.getElementById('new-c').value);
            save(); cancelEdit(); render();
        }

        function cancelEdit() {
            ['new-n','new-inn','new-p','new-c'].forEach(i => document.getElementById(i).value = '');
            document.getElementById('save-btn').classList.add('hidden');
            document.getElementById('add-btn').classList.remove('hidden');
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function exportCSV() {
            let csv = "Vare;Innkjop;Utsalgspris;Total_Inn;Lager;Solgt;Omsetning;Profit\n";
            state.varer.forEach(v => {
                const s = v.in - v.cur;
                csv += `${v.n};${v.c};${v.p};${v.in};${v.cur};${s};${s*v.p};${(s*(v.p-v.c)).toFixed(2)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Romnes_Kiosken_Status.csv";
            link.click();
        }

        function addVare() {
            const n = document.getElementById('new-n').value;
            const inn = parseInt(document.getElementById('new-inn').value) || 0;
            const p = parseFloat(document.getElementById('new-p').value);
            const c = parseFloat(document.getElementById('new-c').value);
            if(!n || !p || !c) return alert("Fyll ut alt");
            state.varer.push({ id: Date.now(), n, p, c, in: inn, cur: inn });
            save(); render(); cancelEdit();
        }

        render();
    </script>
</body>
</html>
